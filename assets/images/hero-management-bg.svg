      <rect x="86" y="68" width="48" height="5" rx="2.5" fill="#13232d" opacity="0.22"/>
      <rect x="86" y="87" width="66" height="5" rx="2.5" fill="#13232d" opacity="0.2"/>
      <rect x="20" y="132" width="128" height="5" rx="2.5" fill="#13232d" opacity="0.22"/>
      <rect x="20" y="152" width="110" height="5" rx="2.5" fill="#13232d" opacity="0.18"/>
      <rect x="20" y="178" width="56" height="18" rx="3" fill="#c27a32" opacity="0.22"/>
    </g>
    <g id="note">
