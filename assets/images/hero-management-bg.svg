<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1600" role="img" aria-label="Hero archive wall background">
  <defs>
    <linearGradient id="wall" x1="540" y1="0" x2="540" y2="1600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#202027"/>
      <stop offset="0.42" stop-color="#14151a"/>
      <stop offset="1" stop-color="#08090d"/>
    </linearGradient>
    <radialGradient id="lampAmber" cx="18%" cy="8%" r="55%">
      <stop offset="0" stop-color="#df9851" stop-opacity="0.32"/>
      <stop offset="0.42" stop-color="#b86e34" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#b86e34" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lampBlue" cx="88%" cy="18%" r="50%">
      <stop offset="0" stop-color="#5ca8ff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#356796" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#356796" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2e2be"/>
      <stop offset="0.52" stop-color="#cdb384"/>
      <stop offset="1" stop-color="#8e744f"/>
    </linearGradient>
    <linearGradient id="paperCool" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9e2e6"/>
      <stop offset="0.5" stop-color="#a5b5ba"/>
      <stop offset="1" stop-color="#64747d"/>
    </linearGradient>
    <linearGradient id="photo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#242f37"/>
      <stop offset="1" stop-color="#080b0f"/>
    </linearGradient>
    <radialGradient id="pin" cx="42%" cy="34%" r="64%">
      <stop offset="0" stop-color="#ffe7ad"/>
      <stop offset="0.36" stop-color="#e89638"/>
      <stop offset="1" stop-color="#62300f"/>
    </radialGradient>
    <pattern id="wallGrain" width="76" height="76" patternUnits="userSpaceOnUse">
      <path d="M4 13H40M20 50H74M0 72H32" stroke="#ffffff" stroke-opacity="0.035" stroke-width="2"/>
      <path d="M64 6 73 15M10 60 20 67M45 31 55 35" stroke="#d4a160" stroke-opacity="0.045" stroke-width="1.5"/>
    </pattern>
    <pattern id="paperGrain" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M2 7H20M5 18H14" stroke="#3b2a17" stroke-opacity="0.06" stroke-width="1"/>
      <circle cx="17" cy="4" r="1.1" fill="#3b2a17" opacity="0.05"/>
    </pattern>
    <filter id="paperShadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="15" stdDeviation="11" flood-color="#000000" flood-opacity="0.46"/>
    </filter>
    <filter id="pinShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <g id="miniPortrait">
      <rect x="0" y="0" width="70" height="84" rx="4" fill="url(#photo)" stroke="#e7c17e" stroke-opacity="0.24"/>
